on:
  push:
    paths:
      - .github/workflows/update-prices.yaml
  schedule:
    - cron: "0 6 * * 1" # Monday at 6am UTC
  workflow_dispatch:

name: update-prices.yaml

permissions: read-all

jobs:
  update-prices:
    if: github.repository == 'tidyverse/ellmer'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: ""
          needs: prices
      - name: Update prices
        run: Rscript --quiet --vanilla data-raw/prices.R

      - name: Check if prices changed
        id: check
        run: |
          if git diff --quiet data-raw/prices.json data-raw/prices.csv R/sysdata.rda; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated files
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data-raw/prices.json data-raw/prices.csv R/sysdata.rda
          git commit -m "chore: update pricing data [skip ci]"
          git push
