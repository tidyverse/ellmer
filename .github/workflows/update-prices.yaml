on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

name: update-prices.yaml

permissions: read-all

jobs:
  update-prices:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Update prices.json
        run: bash data-raw/prices.sh

      - name: Commit updated prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet data-raw/prices.json; then
            git add data-raw/prices.json
            git commit -m "chore: update prices.json [skip ci]"
            git push
          else
            echo "prices.json unchanged, nothing to commit"
          fi
