on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

name: update-prices.yaml

permissions: read-all

jobs:
  update-prices:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Update prices.json
        run: bash data-raw/prices.sh

      - name: Check if prices.json changed
        id: check
        run: |
          if git diff --quiet data-raw/prices.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: r-lib/actions/setup-r@v2
        if: steps.check.outputs.changed == 'true'
        with:
          r-version: release
          use-public-rspm: true

      - name: Install R dependencies
        if: steps.check.outputs.changed == 'true'
        shell: Rscript {0}
        run: install.packages(c("jsonlite", "usethis"))

      - name: Rebuild sysdata.rda
        if: steps.check.outputs.changed == 'true'
        run: Rscript --quiet data-raw/prices.R

      - name: Commit updated files
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data-raw/prices.json R/sysdata.rda
          git commit -m "chore: update pricing data [skip ci]"
          git push
